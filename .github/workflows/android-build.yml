name: Build Android APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with: {java-version: '17', distribution: 'temurin'}
    - name: Generate Gradle Wrapper
      run: |
        curl -sL -o /tmp/gradle.zip "https://services.gradle.org/distributions/gradle-8.2-bin.zip"
        unzip -q -o /tmp/gradle.zip -d /opt
        /opt/gradle-8.2/bin/gradle wrapper --gradle-version 8.2
    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}
    - name: Error Summary
      if: failure()
      run: |
        echo "### Build Error Log" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        grep -A 5 "error:\|ERROR:\|FAILED:\|failure" /tmp/build.log | head -100 >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Last 100 lines" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        tail -100 /tmp/build.log >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: VisionTest-v1.2.0-APK
        path: app/build/outputs/apk/debug/app-debug.apk
