name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Get Gradle Wrapper
      run: |
        curl -sL -o gradlew "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew"
        curl -sL -o gradle/wrapper/gradle-wrapper.jar \
          "https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/8.2/gradle-wrapper-8.2.jar"
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: VisionTest-v1.2.0-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
