name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Get Gradle Wrapper
      run: |
        curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew" -o gradlew
        curl -sL "https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/8.2/gradle-wrapper-8.2.jar" -o gradle/wrapper/gradle-wrapper.jar
        chmod +x gradlew
        echo "Wrappers ready"

    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: VisionTest-v1.2.0-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload Build Reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: |
          app/build/reports/
          app/build/outputs/logs/
